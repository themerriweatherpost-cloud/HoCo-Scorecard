<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<title>The Merriweather Post — 2026 Growth & Development Scorecard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  :root{--ink:#1a1a1a;--paper:#f5f0e8;--rule:#c8bfa8;--accent:#b5381e;--faster:#1a4a7a;--slower:#c8882a;--neutral:#555;--you:#1a6e3f;--card:#faf7f2;color-scheme:light only;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:"IBM Plex Sans",sans-serif;background:var(--paper);color:var(--ink);font-size:14px;-webkit-tap-highlight-color:transparent;color-scheme:light only;}

  .masthead{text-align:center;padding:12px 12px 10px;border-bottom:3px double var(--ink);background:var(--paper);}
  .masthead h1{font-family:"Playfair Display",serif;font-size:clamp(11px,2.6vw,17px);font-weight:900;line-height:1.25;}
  .masthead h1 em{color:var(--accent);font-style:normal;}
  .masthead-links{font-family:"IBM Plex Mono",monospace;font-size:8px;color:var(--neutral);margin-top:5px;border-top:1px solid var(--rule);padding-top:5px;}
  .masthead-links a{color:var(--faster);text-decoration:none;}
  .masthead-links a:hover{text-decoration:underline;}

  .controls{background:var(--card);border-bottom:2px solid var(--ink);padding:7px 10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;position:sticky;top:0;z-index:30;}
  .ctrl-lbl{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);font-weight:600;white-space:nowrap;}
  select,input[type=email]{font-family:"IBM Plex Mono",monospace;font-size:11px;padding:4px 7px;border:1px solid var(--ink);background:var(--paper);color:var(--ink);outline:none;max-width:160px;}
  select:focus,input:focus{border-color:var(--accent);}
  .mybtn{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;background:var(--ink);color:var(--paper);border:none;cursor:pointer;white-space:nowrap;}
  .mybtn:hover{background:var(--accent);}
  .toggle-btn{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;border:1px solid var(--you);color:var(--you);background:transparent;cursor:pointer;white-space:nowrap;transition:all .15s;}
  .toggle-btn.active{background:var(--you);color:white;}

  .pager{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-bottom:1px solid var(--rule);background:var(--paper);position:sticky;top:46px;z-index:29;}
  .pgbtn{font-family:"IBM Plex Mono",monospace;font-size:11px;padding:4px 12px;border:1px solid var(--ink);background:transparent;cursor:pointer;transition:all .15s;}
  .pgbtn:hover{background:var(--ink);color:var(--paper);}
  .pgbtn:disabled{opacity:.2;cursor:default;pointer-events:none;}
  .pg-info{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--neutral);text-align:center;flex:1;padding:0 6px;}
  .pg-info b{color:var(--ink);font-size:11px;}

  .main{max-width:700px;margin:0 auto;padding:16px 12px 60px;}

  /* INTRO */
  .intro-hero{font-family:"Playfair Display",serif;font-size:clamp(20px,5vw,30px);font-weight:900;line-height:1.2;margin-bottom:4px;}
  .intro-hero em{color:var(--accent);font-style:normal;}
  .intro-byline{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--neutral);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--rule);}
  .intro-body{font-size:14px;line-height:1.75;}
  .intro-body p{margin-bottom:13px;}
  .intro-body h3{font-family:"Playfair Display",serif;font-size:17px;font-weight:700;margin:22px 0 7px;}
  .intro-disclosure{font-size:11px;line-height:1.65;color:var(--neutral);background:#f0ede6;border-left:3px solid var(--rule);padding:10px 12px;margin-top:20px;}
  .intro-start{display:block;width:100%;padding:13px;background:var(--ink);color:var(--paper);font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;margin-top:24px;text-align:center;}
  .intro-start:hover{background:var(--accent);}

  /* PARTICIPANT TABLE */
  .part-table{width:100%;border-collapse:collapse;font-size:12px;margin:12px 0 20px;}
  .part-table th{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--neutral);padding:6px 8px;border-bottom:2px solid var(--ink);text-align:left;}
  .part-table td{padding:6px 8px;border-bottom:1px solid var(--rule);vertical-align:top;}
  .part-table td:first-child{font-weight:600;white-space:nowrap;}
  .responded{color:var(--faster);}
  .dnr{color:var(--neutral);}
  .part-footnote{font-size:10px;color:var(--neutral);margin-top:6px;line-height:1.5;}

  /* Q PAGE */
  .q-num{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--neutral);margin-bottom:4px;}
  .q-text{font-family:"Playfair Display",serif;font-size:clamp(13px,2.2vw,16px);font-weight:700;line-height:1.5;margin-bottom:16px;border-left:3px solid var(--accent);padding-left:10px;}
  .you-banner{font-size:10px;font-weight:600;color:var(--you);background:#edf8f1;border-left:3px solid var(--you);padding:5px 10px;margin-bottom:12px;}

  /* SPECTRUM */
  .spec-lbl{font-family:"Playfair Display",serif;font-size:17px;font-weight:700;color:var(--ink);margin-bottom:8px;}
  .spec-outer{position:relative;padding:0 36px;}
  .spec-dots-area{position:relative;width:100%;}
  .spec-axis-normal{height:8px;border-radius:4px;background:linear-gradient(to right,var(--slower),#ddd 50%,var(--faster));}
  .spec-axis-reversed{height:8px;border-radius:4px;background:linear-gradient(to right,var(--faster),#ddd 50%,var(--slower));}
  .spec-axis-neutral{height:8px;border-radius:4px;background:#ccc;}
  .spec-ticks{display:flex;padding:5px 0 2px;}
  .spec-tick{font-family:"IBM Plex Sans",sans-serif;font-size:8px;font-weight:500;color:var(--ink);text-align:center;flex:1;line-height:1.3;}
  .spec-ends{display:flex;justify-content:space-between;margin-top:3px;}
  .spec-end{font-family:"IBM Plex Sans",sans-serif;font-size:10px;font-weight:700;}
  .spec-end.slower{color:var(--slower);} .spec-end.faster{color:var(--faster);}

  /* DOTS */
  .dot-wrap{position:absolute;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:2px;}
  .dot-photo{border-radius:50%;object-fit:cover;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.2);display:block;}
  .dot-ph{border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-family:"IBM Plex Sans",sans-serif;font-weight:700;color:white;}
  .dot-name{font-family:"IBM Plex Sans",sans-serif;font-size:9px;font-weight:700;text-align:center;white-space:nowrap;max-width:88px;overflow:hidden;text-overflow:ellipsis;}
  .dot-score{font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:600;color:var(--neutral);text-align:center;}

  /* PILLS for all-races */
  .pill-wrap{position:absolute;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:1px;}
  .pill{font-family:"IBM Plex Sans",sans-serif;font-size:9px;font-weight:600;padding:3px 7px;background:var(--card);border:1px solid var(--rule);color:var(--ink);white-space:nowrap;border-radius:2px;}
  .pill.you-pill{background:var(--you);color:white;border-color:var(--you);}
  .pill-sub{font-family:"IBM Plex Mono",monospace;font-size:7px;color:var(--neutral);text-align:center;}

  /* NUANCE NOTE */
  .q-note-nuance{font-size:10px;line-height:1.55;padding:6px 10px;margin-top:8px;border-radius:2px;color:var(--neutral);background:#f5f5f0;border-left:2px solid #bbb;}

  /* DNR */
  .below-sect{margin-top:12px;}
  .below-sect-lbl{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--neutral);margin-bottom:5px;font-weight:600;}
  .below-area{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
  .badge{font-size:9px;font-weight:500;padding:3px 8px 3px 4px;border:1px solid var(--rule);color:var(--neutral);background:var(--card);display:flex;align-items:center;gap:5px;}
  .badge-photo{width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0;}
  .badge-ph{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:white;}

  /* BAR CHART */
  .hdivider{border:none;border-top:2px solid var(--rule);margin:18px 0 14px;}
  .vchart-lbl{font-family:"Playfair Display",serif;font-size:17px;font-weight:700;color:var(--ink);margin-bottom:4px;padding:0 36px;}
  .vchart-sub{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--neutral);padding:0 36px;margin-bottom:10px;}
  .vchart-outer{padding:0 36px;}
  .vchart-cols{display:flex;align-items:flex-end;height:110px;gap:3px;}
  .vchart-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%;}
  .vchart-bar{width:100%;border-radius:3px 3px 0 0;transition:height .8s cubic-bezier(.4,0,.2,1);height:0;}
  .vchart-n{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:700;color:var(--ink);text-align:center;margin-bottom:3px;}
  .vchart-tick-row{display:flex;gap:3px;border-top:2px solid var(--ink);padding-top:5px;}
  .vchart-tick{font-family:"IBM Plex Sans",sans-serif;font-size:8px;font-weight:600;color:var(--ink);text-align:center;flex:1;line-height:1.3;}

  /* METHODOLOGY */
  .meth-note{margin-top:28px;padding:14px;background:#f0ede6;border-top:2px solid var(--rule);font-size:10px;color:var(--neutral);line-height:1.75;}
  .meth-note strong{color:var(--ink);}

  /* GROWTH CONTINUUM */
  .gc-title{font-family:"Playfair Display",serif;font-size:clamp(18px,4vw,26px);font-weight:900;margin-bottom:3px;}
  .gc-subtitle{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--neutral);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--rule);}
  .gc-spectrum-outer{position:relative;padding:0 36px;margin-bottom:6px;}
  .gc-axis{height:8px;background:linear-gradient(to right,var(--slower),#ddd 50%,var(--faster));border-radius:4px;}
  .gc-tier-labels{display:flex;margin-top:5px;}
  .gc-tier-lbl{flex:1;text-align:center;font-family:"IBM Plex Sans",sans-serif;font-size:10px;font-weight:700;}
  .gc-tier-lbl.slow{color:var(--slower);} .gc-tier-lbl.mid{color:var(--neutral);} .gc-tier-lbl.fast{color:var(--faster);}

  /* SCORE TABLE */
  .score-table{width:100%;border-collapse:collapse;margin-top:20px;font-size:12px;}
  .score-table th{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--neutral);padding:6px 8px;border-bottom:2px solid var(--ink);text-align:left;}
  .score-table td{padding:8px 8px;border-bottom:1px solid var(--rule);vertical-align:middle;}
  .score-table tr.you-row td{background:#edf8f1;}
  .score-num{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:700;}
  .score-num.pos{color:var(--faster);}
  .score-num.neg{color:var(--slower);}
  .score-num.zero{color:var(--neutral);}
  .tier-badge{font-family:"IBM Plex Mono",monospace;font-size:8px;letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:2px;white-space:nowrap;}
  .tier-pro{background:#e8eef5;color:var(--faster);}
  .tier-neutral{background:#f0f0f0;color:var(--neutral);}
  .tier-slow{background:#fdf5e8;color:var(--slower);}
  .match-pct{font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:700;color:var(--you);}
  .st-photo{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid white;box-shadow:0 1px 3px rgba(0,0,0,.15);}
  .st-ph{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:white;}
  .st-name{font-weight:600;font-size:12px;}
  .st-office{font-family:"IBM Plex Mono",monospace;font-size:8px;color:var(--neutral);text-transform:uppercase;letter-spacing:.06em;}

  /* ALIGNMENT */
  .align-section{margin-top:24px;}
  .align-title{font-family:"Playfair Display",serif;font-size:17px;font-weight:700;margin-bottom:3px;}
  .align-sub{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--neutral);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;}

  /* WRITTEN RESPONSES */
  .wr-title{font-family:"Playfair Display",serif;font-size:clamp(18px,4vw,26px);font-weight:900;margin-bottom:3px;}
  .wr-subtitle{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--neutral);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--rule);}
  .wr-entry{margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--rule);}
  .wr-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .wr-photo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.15);flex-shrink:0;}
  .wr-ph{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;}
  .wr-name{font-family:"IBM Plex Sans",sans-serif;font-size:14px;font-weight:700;}
  .wr-office{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--neutral);text-transform:uppercase;letter-spacing:.08em;}
  .wr-text{font-size:13px;line-height:1.75;white-space:pre-wrap;color:var(--ink);}
  .wr-empty{font-size:12px;color:var(--neutral);font-style:italic;}
  .wr-reader-intro{font-size:12px;color:var(--neutral);background:#f5f5f0;border-left:2px solid var(--rule);padding:10px 12px;margin-bottom:16px;line-height:1.6;}
  .wr-reader-item{font-size:13px;line-height:1.7;padding:10px 0;border-bottom:1px solid var(--rule);color:var(--ink);}

  .swipe-hint{text-align:center;font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--rule);padding:10px;letter-spacing:.1em;}
  @media(max-width:480px){
    .spec-outer,.vchart-outer,.gc-spectrum-outer{padding:0 18px;}
    .vchart-lbl,.vchart-sub{padding:0 18px;}
    .dot-name{font-size:8px;max-width:70px;}
    .spec-tick,.vchart-tick{font-size:7px;}
  }
</style>
</head>
<body>
<div class="masthead">
  <h1>The Merriweather Post &nbsp;&middot;&nbsp; <em>2026 Growth &amp; Development</em> &nbsp;&middot;&nbsp; Primary Candidate Scorecard</h1>
  <div class="masthead-links">
    <a href="https://themerriweatherpost.substack.com" target="_blank">Substack: themerriweatherpost.substack.com</a>
    &nbsp;&middot;&nbsp;
    <a href="https://www.facebook.com/themerriweatherpost/" target="_blank">Facebook: www.facebook.com/themerriweatherpost</a>
  </div>
</div>

<div class="controls">
  <div style="display:flex;align-items:center;gap:5px">
    <span class="ctrl-lbl">Race</span>
    <select id="racesel" onchange="onRace()">
      <option value="exec">County Executive</option>
      <option value="d1">District 1</option>
      <option value="d2">District 2</option>
      <option value="d3">District 3</option>
      <option value="d4">District 4</option>
      <option value="d5">District 5</option>
      <option value="all">All Races</option>
    </select>
  </div>
  <div style="display:flex;align-items:center;gap:5px">
    <span class="ctrl-lbl">View</span>
    <select id="qsel" onchange="onQ()"></select>
  </div>
  <div style="display:flex;align-items:center;gap:4px">
    <input type="email" id="email" placeholder="your@email.com" style="width:136px" onkeydown="if(event.key===\'Enter\')lookupYou()" />
    <button class="mybtn" onclick="lookupYou()">Find Me</button>
  </div>
  <button class="toggle-btn" id="youtoggle" onclick="toggleYou()" style="display:none">Show My Answer</button>
</div>

<div class="pager">
  <button class="pgbtn" id="pbtn" onclick="prevQ()">&#8592; Prev</button>
  <div class="pg-info" id="pginfo"></div>
  <button class="pgbtn" id="nbtn" onclick="nextQ()">Next &#8594;</button>
</div>

<div class="main" id="main"></div>
<div class="swipe-hint">&#8592; swipe or use arrow keys &#8594;</div>

const WRITTEN_RESPONSES = {"Bob Cockey": "We need to create housing for the first time home buyer which were in return will create generation wealth all these renters do not gain anything for the future. \nWe also need to make our county the health of the country we're losing all these jobs and the healthcare industry is the only place we can really stand out and accelerate.", "Deb Jung": "Thank you for your survey. I appreciate your interest and knowledge about Downtown Columbia and zoning regulations. I am always happy to discuss land-use issues, such as the ones that are included in your survey, but I am unable to provide accurate answers in the current survey format. Many of these questions require multi-faceted answers that involve more than just selecting a spectrum of agreement or disagreement. Again, I appreciate your interest in all things Downtown Columbia and look forward to seeing the survey responses. Best regards, Deb", "Linfeng Chen": "Thank you!", "Felita Phillips": "These were some very interesting questions, and when I responded, \"somewhat agree,\" I could strongly agree but would need to know the exact manner to which the task is to be completed.\n\nEx. 27,000 new housing units through 2040 is a great idea but the execution of this is where I would be strongly for or against. Where are all these new homes going to go?? The new council person will be involved in moving zoning lines/rezoning. Here is where we must determine exactly where these 27,000 new homes can go.\n\nRevitalizing the Village centers to be a mixed use structure would help with the need of affordable housing and the housing shortage. Many of the village centers have good land space that could be utilized into multi unit housing and commercial space.", "Christiana Rigby": "2. The county should deny or delay housing development proposals located in school assignment areas that are already at capacity.\nThis question deserves a more precise answer than a simple yes or no, because not all housing affects school capacity equally. The strongest predictor of student generation is bedroom ratio, and our policy should reflect that. I would support a tiered approach: proposals with higher bedroom ratios in overenrolled areas wait longer in the pipeline, while proposals with lower bedroom ratios move forward more quickly. A studio or one-bedroom apartment generates a fraction of the students that a four-bedroom single-family home does. Treating them identically is not careful management of school capacity. It is a blunt instrument that prevents us from building the housing our community needs while doing little to protect classrooms.\n\n5. County APFO regulations should be revised in accordance with the recommendations from the APFO review committee to replace mandatory wait times with a new school overcapacity fee when adding new housing development to areas with overenrolled schools.\nI support moving away from our current APFO approach, though I want to be direct: a school overcapacity fee alone does not solve the underlying problem. Our current policy applies the same mandatory wait times to every housing form, across the entire county, regardless of the actual impact on school capacity. The result is that we have stopped building housing for everyone, especially young workers, which means we are losing taxpaying residents who cannot find a place to live here. Current APFO is not protecting or supporting our schools. The current approach is hollowing out the tax base that funds them.\nThe right solution is a regional approach that matches the growth designations in HoCo By Design, layered with housing type and bedroom ratio data. That gives us a smarter, more targeted tool than the blanket 1990s-era policy we are still applying today.\n\n6 & 7. The county should eliminate \"fee-in-lieu\" as an option for developers to avoid the MIHU requirement. The county should utilize inclusionary zoning as a tool to provide more affordable housing units.\nTaking these together: I support eliminating fee-in-lieu for the last remaining housing type where it still applies, single-family detached homes, and requiring actual units instead. But I also want to be honest that standard inclusionary zoning, as currently structured, shifts the cost burden onto the other buyers or renters in the same development, raising prices for middle-income households in the process. If we want affordability without that trade-off, we need government to be a genuine financial partner.\n\nThat means pairing the on-site inclusionary zoning requirement with tools that defray the cost: PILOTs, gap financing, land banking, and other public subsidy mechanisms that make affordable units financially viable without simply pricing out everyone else. The goal is real affordability, built into real projects, not a fee that gets collected and disappears into the general fund.\n\n9. The county should increase transfer and recordation tax rates on home sales to fund infrastructure.\nIn my first term, I proposed a restructured progressive recordation tax that would have generated an additional $30 million annually for our schools. It would have reduced the burden on first-time homebuyers and asked those purchasing multi-million dollar properties to contribute proportionally more. It did not pass, but the case for it has only grown stronger.\nWe should evaluate all of our tax structures with fresh eyes. The state has now authorized counties to adopt a progressive income tax, and we should model what a restructured income tax, alongside a revised recordation tax, would mean for our revenue picture over a multi-year horizon.\n\nThis is not about raising taxes for their own sake. It is about building a sustainable, progressive revenue model that fully funds our schools and infrastructure without placing the entire burden on current residents.\n\n16. Environmental mitigation requirements should be maintained at current levels, even if they slow or limit development projects.\nHoward County contains multiple watersheds with genuinely different environmental characteristics, and our policy should reflect that complexity rather than apply a single standard everywhere. My approach is straightforward: steer growth toward areas with existing infrastructure and planned community capacity, and for those areas, create a transparent scoring system that weighs competing priorities together rather than treating each in isolation and requiring the highest threshold for all.\nThat means putting tree canopy, specimen trees, water quality, stormwater management, energy efficiency, and open space requirements in conversation with climate resilience and housing affordability in a single, coherent framework. The goal is not to weaken environmental protections. It is to create a clear, predictable pathway from planning to building, so that we can actually deliver the housing our community needs without sacrificing the green infrastructure that makes Howard County so appealing to live in.", "Kevin Chin": "The Spending Affordability Advisory Committee laid out clearly that when you have budgetary problems, there are three things you can do: raise taxes, cut services, or grow your tax base. To me, the answer is clear, we need to grow our tax base to fund our schools and the amazing services we have in Howard County. Over 90% of our county revenue comes from property and income taxes. More residents means an abundance for all. I recently spoke with a city councilmember in Falls Church, VA. They've actually been able to lower taxes multiple years in a row because of their ability to welcome new residents.\n\nToo often there has been a narrative that new residents hurt our community and harm our schools. This couldn't be further from the truth financially but also spiritually, morally. We like to think of ourselves as a bastion of liberalism and inclusivity. It's time we live up to that story we tell ourselves.", "Arinze Ifekauche": "", "Janssen Evelyn": "Howard County is at a crossroads. We can choose the comfort of the status quo, or we can find the courage to build a future that is vibrant, inclusive, and built for everyone.\n\nI am not running to learn the job. I am running to do the work. I have spent years overseeing housing, land use, and economic development policy at the highest levels of local government. We are entering a new chapter where the next County Council will take on the most significant zoning reform in a generation. We cannot afford a learning curve. I bring the technical expertise and executive experience to move these reforms from a plan to a place on day one.\n\nGrowth is more than a line item on a spreadsheet. It is about placemaking. My work on the Hickory Ridge Village Board and as the President (now Immediate Past) of the Howard County Conservancy has taught me that land use is about belonging. Every decision we make about a physical space either builds community or it erodes it.\n\nOur current zoning rules act as a wall against the very diversity we claim to value. We need Missing Middle housing. We need duplexes, cottage courts, and accessory dwelling units so our seniors can age in place, our young adult children can have a place to live, and our teachers and first responders can actually afford to live in the neighborhoods they serve. I am calling for by right mixed use development in our Village Centers. These hubs must be the heartbeat of our community where housing, small business, and public life converge.\n\nOn infrastructure, we must be honest. The current APFO system of years long wait times has not built a single classroom. It only creates delays while costs skyrocket. I want overcapacity fees and smart growth that expands our tax base. That is how we fund our schools and move the needle on building out multimodal infrastructure.\n\nReal leadership requires fiscal discipline. Protecting our AAA bond rating is not a luxury. It is a shield for our taxpayers that allows us to build at the lowest possible cost. We must grow the pie through smart growth and zoning reform instead of drowning in high interest debt. This includes leveraging a Resilience Authority to fund large scale climate infrastructure and stormwater mitigation. By using this kind of dedicated financing vehicle, we can protect our neighborhoods from the effects of a changing climate without overextending our general fund.\n\nFinally, we must recognize that density is an environmental necessity. When we build walkable hubs in Downtown Columbia and Gateway, we stop sprawl and save our green space.\n\nThis vision is more than a policy platform. It is a return to the founding principles of James Rouse, who imagined Columbia as a garden for growing people and believed that a community must be socially and economically inclusive to succeed. I am running to ensure that as we grow, we build a table where everyone has a seat. Where growth strengthens our community instead of straining it. Where we honor our history by making deliberate choices about our future. That is how we build a Howard County that lives up to its promise.", "Jessica Nichols": "1. Somewhat Agree\nIncreasing housing supply is essential to meeting demand, supporting affordability, and sustaining long-term economic growth, particularly as the county's population ages and housing options remain limited. I support this target as a starting point on our way towards the best case scenario IF surrounding infrastructure adequately keeps pace.\n\n2. Somewhat Disagree\nDelaying development only helps if infrastructure is being expanded and upgraded during the delay. We aren't using the time to make the necessary improvements to schools, roads, etc. because the funding isn't there to support it. It is a vicious cycle that we must break out of. Denying opportunities to increase revenue will not solve infrastructure challenges. Limiting growth has only made these issues worse.\n\n3. Strongly Agree\nExpanding overall housing supply helps relieve market pressure, though it must be paired with targeted affordable housing strategies. It is important that this include options for low-income households and middle-income households.\n\n4. Strongly Agree\nExpanding the tax base through housing and population growth is a key tool for funding schools, infrastructure, and public services.\n\n5. Somewhat Disagree\nI support APFO reform but not exactly in the way the review committee recommended. We need more flexibility to ensure APFO can become a tool that works for everyone. Increasing density near an over-capacity school doesn't automatically add to the school's burden. It depends what kind of housing it is and if it will yield new students. For example, there's no reason for senior housing developments to be held up by APFO, nor should we hold back on studios or 1 bedroom apartments. Developments of single family homes present the most likelihood for additional students and such projects should not be treated the same way as every other project. We would be better served by regulating growth more surgically.\n\n6. Strongly Agree\nRequiring actual affordable units is more effective than fee payments, which delay impact and typically produce fewer units.\n\n7. Strongly Agree\nInclusionary zoning is an important tool to ensure affordable housing is integrated into new development.\n\n8. Somewhat Agree\nFees can contribute to higher costs, but they are also necessary to fund infrastructure that supports growth. As with other land-use policies, flexible application for different types of development would help keep costs down for families who are least likely to have the extra money.\n\n9. Neither Agree nor Disagree\nWhile funding is needed, increasing transaction taxes can further constrain housing activity and affordability. Howard County could greatly benefit from higher fees in the short term but our goal should be to eventually reach a growth cadence that would make us less reliant on such tools.\n\n10. Neither Agree nor Disagree\nThis is a bit of a false choice. Small increases in debt service will not risk our AAA rating. I do not support anything that compromises our ability to maintain fiscal stability and the county's bond rating.\n\n11. Strongly Agree\nBond financing can provide critical gap funding that enables affordable housing projects to move forward.\n\n12. Strongly Agree\nExpanding housing types increases supply, improves affordability, and better meets diverse household needs.\n\n13. Strongly Agree\nStreamlining zoning can reduce barriers to growth and support revitalized, mixed-use communities.\n\n14. Strongly Agree\nReducing delays and complexity lowers costs and makes it more feasible to deliver housing and economic development projects. Howard County has a reputation in the state as being one of the most difficult places to do business and it is essential that we turn that around.\n\n15. Neither Agree nor Disagree\nThere should always be room for hearing public input and even objection. That is how governments are held accountable. Residents certainly should not have material influence on such decisions outside of their right to be heard. Barring compelling objections, projects that meet zoning and code requirements should not be subject to indefinite delay.\n\n16. Somewhat Agree\nEnvironmental protections are important, but policies should balance sustainability goals with the county's need to grow.\n\n17. Strongly Agree\nEspecially near transit and in mixed use developments. Denser development reduces sprawl and car dependence, supporting more sustainable land use patterns.\n\n18. Strongly Agree\nThe land swap is done and the current building is coming down. My responsibility as a council member will be to see the project through from this point forward. It is an exciting opportunity for strategic investment and for people like me who love books!\n\n19. Strongly Agree\nGateway will play a large part in helping us reach our goal of 27,000 by 2040. It is going to address a lot of the transit and accessibility needs that our residents care about as well. Implementing long-term plans supports coordinated growth and maximizes economic opportunity. Win/win.\n\n20. Strongly Agree\nI like to think of it as setting up Downtown for longterm success. Reinvesting in downtown amenities will ensure sustained vitality."};

// SCORING
function scoreResp(r,rev){if(!r||r===3)return 0;const p={1:2,2:1,4:-1,5:-2}[r];return rev?-p:p;}
function compScore(rs){if(!rs)return null;return rs.reduce((s,r,i)=>s+(EXCLUDED_FROM_SCORE.has(i)?0:scoreResp(r,QS_REV[i])),0);}
function agreeP(r1s,r2s){
  if(!r1s||!r2s)return 0;
  let a=0,t=0;
  r1s.forEach((r1,i)=>{const r2=r2s[i];if(!r1||!r2)return;t++;const d=Math.abs(r1-r2);if(d===0)a+=1;else if(d===1)a+=.5;});
  return t?Math.round(a/t*100):0;
}
function rToPos(r){if(!r)return null;return{1:90,2:70,3:50,4:30,5:10}[r];}
function cToPos(s){if(s===null)return null;return 5+((s+30)/60)*90;}
function wtdAvg(qi){const d=RDIST[qi];let t=0,n=0;d.forEach((c,i)=>{t+=c*(i+1);n+=c;});return n?t/n:3;}
function getTier(s){
  if(s>=7)return{label:"Pro Growth",cls:"tier-pro"};
  if(s>=-6)return{label:"Growth Neutral",cls:"tier-neutral"};
  return{label:"Slow Growth",cls:"tier-slow"};
}

function getPhoto(name,size,color){
  if(PHOTOS[name])return`<img class="dot-photo" src="${PHOTOS[name]}" style="width:${size}px;height:${size}px" alt="${name}">`;
  const ini=name.split(" ").map(w=>w[0]).join("").substring(0,2);
  return`<div class="dot-ph" style="width:${size}px;height:${size}px;background:${color};font-size:${Math.round(size*.28)}px">${ini}</div>`;
}
function getPhotoSm(name,color){

  const ini=name.split(" ").map(w=>w[0]).join("").substring(0,2);
  return`<div class="st-ph" style="background:${color}">${ini}</div>`;
}
function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// BUILD DOTS - photos (single race)
function buildDots(items,sz){
  const SLOT=82;
  const pm={};
  items.forEach(d=>{if(d._pos===null||d._pos===undefined)return;const k=Math.round(d._pos);if(!pm[k])pm[k]=[];pm[k].push(d);});
  const maxS=Math.max(1,...Object.values(pm).map(a=>a.length));
  let h=`<div class="spec-dots-area" style="height:${maxS*SLOT+8}px;position:relative;">`;
  Object.entries(pm).forEach(([k,its])=>{
    const pos=its[0]._pos;
    its.forEach((d,idx)=>{
      const bot=idx*SLOT+4;
      let ph,nc="var(--ink)";
      if(d._isYou){ph=`<div class="dot-ph" style="width:${sz}px;height:${sz}px;background:var(--you);font-size:${Math.round(sz*.24)}px;font-weight:700">YOU</div>`;nc="var(--you)";}
      else{const col=d.party==="R"?"#8b2315":"#1a4a7a";ph=getPhoto(d.name,sz,col);}
      const sc=d._showScore?`<div class="dot-score">${d._scoreLabel}</div>`:"";
      h+=`<div class="dot-wrap" style="left:${pos}%;bottom:${bot}px">${ph}<div class="dot-name" style="color:${nc}">${d.name}</div>${sc}</div>`;
    });
  });
  return h+`</div>`;
}

// BUILD PILLS - text (all races) - groups by proximity for continuous scores
function buildPills(items){
  const SLOT=44;
  const THRESH=6; // % proximity threshold for grouping
  // Sort by position
  const sorted=items.filter(d=>d._pos!==null&&d._pos!==undefined).sort((a,b)=>a._pos-b._pos);
  // Group by proximity
  const groups=[];
  sorted.forEach(d=>{
    const last=groups[groups.length-1];
    if(last&&Math.abs(last.pos-d._pos)<=THRESH){last.items.push(d);}
    else{groups.push({pos:d._pos,items:[d]});}
  });
  const maxS=Math.max(1,...groups.map(g=>g.items.length));
  let h=`<div class="spec-dots-area" style="height:${maxS*SLOT+8}px;position:relative;">`;
  groups.forEach(g=>{
    g.items.forEach((d,idx)=>{
      const bot=idx*SLOT+4;
      if(d._isYou){
        h+=`<div class="pill-wrap" style="left:${g.pos}%;bottom:${bot}px"><div class="pill you-pill">YOU${d._scoreLabel?" "+d._scoreLabel:""}</div></div>`;
      } else {
        const parts=d.name.split(" ");
        const shortName=parts.length>1?`${parts[0]} ${parts[parts.length-1][0]}.`:d.name;
        const sc=d._showScore?`<div class="pill-sub">${d._scoreLabel}</div>`:`<div class="pill-sub">${C_OFFICE[d.name]||""}</div>`;
        h+=`<div class="pill-wrap" style="left:${g.pos}%;bottom:${bot}px"><div class="pill" title="${d.name}">${shortName}</div>${sc}</div>`;
      }
    });
  });
  return h+`</div>`;
}

  let h=`<table class="score-table"><thead><tr>
    <th></th><th>Candidate</th><th>Score</th><th>Tier</th>
    ${showMatch?`<th style="color:var(--you)">Your Match</th>`:""}
  </tr></thead><tbody>`;

  if(showMatch){
    const yourScore=compScore(youData.r);
    const tier=getTier(yourScore);
    const sc=yourScore>0?"+"+yourScore:""+yourScore;
    h+=`<tr class="you-row">
      <td><div class="st-ph" style="background:var(--you);width:30px;height:30px;font-size:9px">YOU</div></td>
      <td><div class="st-name" style="color:var(--you)">Your Score</div></td>
      <td><span class="score-num ${yourScore>0?"pos":yourScore<0?"neg":"zero"}">${sc}</span></td>
      <td><span class="tier-badge ${tier.cls}">${tier.label}</span></td>
      <td>&mdash;</td>
    </tr>`;
  }

  sorted.forEach(c=>{
    const sc=compScore(c.r);
    const tier=getTier(sc);
    const scStr=sc>0?"+"+sc:""+sc;
    const col=c.party==="R"?"#8b2315":"#1a4a7a";
    const ph=getPhotoSm(c.name,col);
    const match=showMatch?`<td><span class="match-pct">${agreeP(youData.r,c.r)}%</span></td>`:"";
    h+=`<tr>
      <td>${ph}</td>
      <td><div class="st-name">${c.name}</div><div class="st-office">${C_OFFICE[c.name]||""}</div></td>
      <td><span class="score-num ${sc>0?"pos":sc<0?"neg":"zero"}">${scStr}</span></td>
      <td><span class="tier-badge ${tier.cls}">${tier.label}</span></td>
      ${match}
    </tr>`;
  });
  h+=`</tbody></table>`;
  return h;
}

function render(){
  const isAll=race==="all";
  const safeRace=(race==="readers")?"exec":race;
  const rd=isAll?{title:"All Races",candidates:Object.values(RACES).flatMap(r=>r.candidates)}:RACES[safeRace];

  // Update race dropdown - add Reader Responses only on written page
  const racesel=document.getElementById("racesel");
  const hasReaders=racesel.querySelector('option[value="readers"]');
  if(qi===20&&!hasReaders){
    const o=document.createElement("option"); o.value="readers"; o.textContent="Reader Responses";
    racesel.appendChild(o);
  } else if(qi!==20&&hasReaders){
    racesel.removeChild(hasReaders);
    if(race==="readers"){race="exec"; racesel.value="exec";}
  }

  document.getElementById("pbtn").disabled=(qi<=-1);
  document.getElementById("nbtn").disabled=(qi>=21);
  document.getElementById("pginfo").innerHTML=
    qi===-1?"<b>Introduction</b>":
    qi===20?"<b>Written Responses</b>":
    qi===21?"<b>Growth Continuum</b>":
    `<b>Q${QS[qi].id} of 20</b> &middot; ${QS[qi].short}`;

  const yt=document.getElementById("youtoggle");
  yt.style.display=(youData&&qi!==-1)?"inline-block":"none";
  yt.className="toggle-btn"+(showYou?" active":"");
  yt.textContent=showYou?"&#9733; My Answer On":"Show My Answer";

  if(qi===-1)renderIntro();
  else if(qi===20)renderWritten();
  else if(qi===21)renderGC(rd,isAll);
  else renderQ(rd,isAll);
}

function renderIntro(){
  document.getElementById("main").innerHTML=`
  <div class="intro-hero">2026 Howard County Primary<br><em>Growth &amp; Development</em><br>Candidate Scorecard</div>
  <div class="intro-byline">The Merriweather Post &nbsp;&middot;&nbsp; themerriweatherpost.substack.com</div>
  <div class="intro-body">
    <p>Every candidate running for Howard County Executive and County Council in the 2026 primary was sent a 20-question questionnaire asking where they stand on housing, zoning, and development. Their responses are presented here exactly as submitted &mdash; no editorializing, no endorsements.</p>

    <h3>Who Participated</h3>
    <table class="part-table">
      <thead><tr><th>Office</th><th>Responded</th><th>Did Not Respond</th></tr></thead>
      <tbody>
        <tr><td>County Executive</td><td class="responded">Bob Cockey</td><td class="dnr">Vanessa Atterbeary, Deb Jung*, Liz Walsh</td></tr>
        <tr><td>District 1</td><td class="responded">Kevin Chin</td><td class="dnr">James Handley, Jean Xu</td></tr>
        <tr><td>District 2</td><td class="responded">Arinze Ifekauche, Jessica Nichols</td><td class="dnr">&mdash;</td></tr>
        <tr><td>District 3</td><td class="responded">Christiana Rigby</td><td class="dnr">Amir Naviwala</td></tr>
        <tr><td>District 4</td><td class="responded">Janssen Evelyn, Linfeng Chen</td><td class="dnr">Regina Clay, Shamieka Preston</td></tr>
        <tr><td>District 5</td><td class="responded">Felita Phillips</td><td class="dnr">Cat Carter, Ryan O&rsquo;Connor</td></tr>
      </tbody>
    </table>
    <p class="part-footnote">*Deb Jung responded to note that she was unable to provide responses in this format. Her full statement is included in the Written Responses section.</p>

    <h3>How It Works</h3>
    <p>Use the <strong>Race</strong> dropdown to filter by office &mdash; County Executive or any of the five Council districts. Use the <strong>View</strong> dropdown or the Prev/Next buttons to move through all 20 questions.</p>
    <p>Each question page includes a spectrum with candidate photos positioned above their response, indicating the extent to which they agree or disagree with that statement. Below the spectrum, a bar chart shows how the 124 Merriweather Post readers who completed the reader survey answered the same statement, giving you a sense of where TMP readers stand relative to each candidate.</p>
    <p>Candidates who did not respond by the April 17 deadline are listed below the spectrum.</p>

    <h3>Personalize It</h3>
    <p>If you completed the Merriweather Post reader poll, enter your email in the <strong>Find Me</strong> field and toggle on your answer to see exactly where your response falls relative to each candidate on every question.</p>
    <p>If you haven&rsquo;t yet completed the reader survey and would like your answers to appear on the spectrum alongside the candidates, you can still do so here: <a href="https://forms.gle/ufoF5qLyT8xw6mZL8" target="_blank" style="color:var(--faster)">Reader Survey</a>. Note that it may take a day or two for your responses to appear in the Find Me feature, as the dashboard is updated manually.</p>

    <h3>How Questions Are Framed</h3>
    <p>Each question is mapped onto a <strong style="color:var(--slower)">Slower Growth</strong> &harr; <strong style="color:var(--faster)">Faster Growth</strong> spectrum. The response axis always reads the same way from left to right: Strongly Disagree, Somewhat Disagree, Neither, Somewhat Agree, Strongly Agree. On most questions, agreeing with the statement reflects a faster-growth orientation. On some questions, agreeing actually reflects a slower-growth position &mdash; on those questions the color coding and growth direction labels flip, and a note appears below the spectrum. A number of questions touch on topics &mdash; like fiscal policy, environmental requirements, or affordable housing financing &mdash; where the growth framing is not relevant. Those questions are also marked with a context note.</p>
    <p>Faster growth and slower growth represent two legitimate ways of thinking about Howard County&rsquo;s future. This scorecard takes no position on which is right.</p>

    <h3>The Growth Continuum</h3>
    <p>The final page summarizes every responding candidate&rsquo;s overall growth orientation in a single view, scored on a scale from &minus;30 to +30 across the 15 questions with a clear growth orientation. A strongly faster-growth answer earns +2, somewhat faster earns +1, Neither earns 0, somewhat slower earns &minus;1, and strongly slower earns &minus;2. A score near zero may reflect genuinely mixed positions &mdash; not indifference. If Find Me is toggled on, your dot appears on the same spectrum, your score appears in the table, and a ranked match percentage shows which candidates most closely align with your responses.</p>

    <div class="intro-disclosure"><strong>Disclosure:</strong> The Merriweather Post covers growth and development in Howard County from a generally pro-growth perspective. The author has made small campaign contributions ($50 each) to Janssen Evelyn, Kevin Chin, and Jessica Nichols. All candidates received identical questionnaires and are presented on identical terms. No candidates have been endorsed.</div>
    <button class="intro-start" onclick="goQ1()">View Scorecard &mdash; Start with Q1 &rarr;</button>
  </div>`;
}
function goQ1(){qi=0;syncSel();render();window.scrollTo(0,0);}

function renderQ(rd,isAll){
  const q=QS[qi];
  const resp=rd.candidates.filter(c=>!c.dnr);
  const dnr=rd.candidates.filter(c=>c.dnr);

  const items=resp.map(c=>({...c,_pos:rToPos(c.r?c.r[qi]:null)}));
  if(youData&&showYou){const yr=youData.r[qi];items.push({name:"You",party:"you",_pos:rToPos(yr),_isYou:true});}

  const dotsH=isAll?buildPills(items):buildDots(items,50);
  const isNeutral=q.nuance;
  const bc=isNeutral?BAR_NEUT:(q.rev?BAR_REV:BAR_NORM);
  const d5=RDIST[qi];
  const mx=Math.max(...d5);
  const wa=wtdAvg(qi);

  let h="";
  h+=`<div class="q-num">Question ${q.id} of 20</div>`;
  h+=`<div class="q-text">${q.text}</div>`;
  if(youData&&showYou)h+=`<div class="you-banner">&#9733; Your answer shown as a green dot</div>`;
  h+=`<div class="spec-lbl">Candidate Responses</div>`;
  h+=`<div class="spec-outer">${dotsH}`;
  h+=`<div class="spec-axis-${isNeutral?"neutral":q.rev?"reversed":"normal"}"></div>`;
  h+=`<div class="spec-ticks"><div class="spec-tick">Strongly<br>Disagree</div><div class="spec-tick">Somewhat<br>Disagree</div><div class="spec-tick">Neither Agree<br>nor Disagree</div><div class="spec-tick">Somewhat<br>Agree</div><div class="spec-tick">Strongly<br>Agree</div></div>`;
  if(!isNeutral){
    h+=`<div class="spec-ends"><span class="spec-end ${q.rev?"faster":"slower"}">&larr; ${q.rev?"Faster Growth":"Slower Growth"}</span><span class="spec-end ${q.rev?"slower":"faster"}">${q.rev?"Slower Growth":"Faster Growth"} &rarr;</span></div>`;
  }
  h+=`</div>`;
  if(isNeutral)h+=`<div class="q-note-nuance">Note: The growth implications of this question are more nuanced &mdash; the growth framing is not as directly relevant here. This question is not included in the Growth Continuum score.</div>`;

  if(dnr.length){
    h+=`<div class="below-sect"><div class="below-sect-lbl">Did not respond by deadline</div><div class="below-area">`;
    dnr.forEach(c=>{
      const ph=PHOTOS[c.name]?`<img class="badge-photo" src="${PHOTOS[c.name]}">`:`<div class="badge-ph" style="background:#aaa">${c.name.split(" ").map(w=>w[0]).join("").substring(0,2)}</div>`;
      h+=`<div class="badge">${ph} ${c.name}</div>`;
    });
    h+=`</div></div>`;
  }

  h+=`<hr class="hdivider">`;
  h+=`<div class="vchart-lbl">Reader Poll Results</div>`;
  h+=`<div class="vchart-sub">Q${q.id} &middot; n=124 readers &middot; Weighted avg: ${wa.toFixed(2)}/5</div>`;
  h+=`<div class="vchart-outer"><div class="vchart-cols">`;
  [4,3,2,1,0].forEach((di,ci)=>{const n=d5[di];const bh=mx>0?Math.round(n/mx*110):0;h+=`<div class="vchart-col"><div class="vchart-n">${n}</div><div class="vchart-bar" style="background:${bc[ci]}" data-h="${bh}px"></div></div>`;});
  h+=`</div><div class="vchart-tick-row"><div class="vchart-tick">Strongly<br>Disagree</div><div class="vchart-tick">Somewhat<br>Disagree</div><div class="vchart-tick">Neither Agree<br>nor Disagree</div><div class="vchart-tick">Somewhat<br>Agree</div><div class="vchart-tick">Strongly<br>Agree</div></div></div>`;
  h+=methNote();

  document.getElementById("main").innerHTML=h;
  requestAnimationFrame(()=>setTimeout(()=>{document.querySelectorAll("[data-h]").forEach(el=>{el.style.height=el.dataset.h;});},30));
}

function renderWritten(){
  const raceOrder=["exec","d1","d2","d3","d4","d5"];
  const officeLabels={"exec":"County Executive","d1":"District 1","d2":"District 2","d3":"District 3","d4":"District 4","d5":"District 5"};
  const wrFilter=race;

  let h="";
  h+=`<div class="wr-title">Written Responses</div>`;
  h+=`<div class="wr-subtitle">Verbatim responses to the optional written comment field</div>`;

  if(wrFilter==="readers"){
    h+=`<div class="wr-reader-intro">The following comments were submitted anonymously by Merriweather Post readers as part of the reader survey. ${READER_WRITTEN.length} readers provided optional written comments.</div>`;
    READER_WRITTEN.forEach(w=>{h+=`<div class="wr-reader-item">${escHtml(w)}</div>`;});
  } else {
    // Build candidate list based on filter
    let cands=[];
    if(wrFilter==="all"){
      raceOrder.forEach(rk=>{
        // Add Deb Jung under exec
        if(rk==="exec") cands.push({name:"Deb Jung",party:"D",race:rk,office:officeLabels[rk],debjung:true,dnr:true,r:null});
        RACES[rk].candidates.forEach(c=>{if(!c.dnr) cands.push({...c,race:rk,office:officeLabels[rk]});});
      });
    } else {
      if(wrFilter==="exec") cands.push({name:"Deb Jung",party:"D",race:"exec",office:"County Executive",debjung:true,dnr:true,r:null});
      RACES[wrFilter]&&RACES[wrFilter].candidates.forEach(c=>{if(!c.dnr) cands.push({...c,race:wrFilter,office:officeLabels[wrFilter]});});
    }

    if(cands.length===0){h+=`<p style="color:var(--neutral);font-size:12px">No written responses for this selection.</p>`;}
    cands.forEach(c=>{
      const col=c.party==="R"?"#8b2315":"#1a4a7a";
      const ph=PHOTOS[c.name]?`<img class="wr-photo" src="${PHOTOS[c.name]}">`:`<div class="wr-ph" style="background:${col}">${c.name.split(" ").map(w=>w[0]).join("").substring(0,2)}</div>`;
      const written=WRITTEN_RESPONSES[c.name]||"";
      h+=`<div class="wr-entry">
        <div class="wr-header">${ph}<div><div class="wr-name">${c.name}</div><div class="wr-office">${c.office}</div></div></div>
        ${written?`<div class="wr-text">${escHtml(written)}</div>`:`<div class="wr-empty">Did not provide an optional written response.</div>`}
      </div>`;
    });
  }
  document.getElementById("main").innerHTML=h;
}

function renderGC(rd,isAll){
  const resp=rd.candidates.filter(c=>!c.dnr&&c.r);
  const dnr=rd.candidates.filter(c=>c.dnr);

  const items=resp.map(c=>{
    const sc=compScore(c.r);
    return{...c,_pos:cToPos(sc),_score:sc,_showScore:true,_scoreLabel:(sc>0?"+":"")+sc};
  });
  if(youData&&showYou){
    const sc=compScore(youData.r);
    items.push({name:"You",party:"you",_pos:cToPos(sc),_score:sc,_isYou:true,_showScore:true,_scoreLabel:(sc>0?"+":"")+sc});
  }

  const dotsH=isAll?buildPills(items):buildDots(items,50);

  let h="";
  h+=`<div class="gc-title">Growth Continuum</div>`;
  h+=`<div class="gc-subtitle">Where the Candidates Stand &mdash; Overall Growth Score (&minus;30 to +30)</div>`;

  h+=`<div class="gc-spectrum-outer">${dotsH}`;
  h+=`<div class="gc-axis" style="margin-top:4px"></div>`;
  h+=`<div style="display:flex;justify-content:space-between;padding:3px 0">
    <span style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--slower)">&minus;30</span>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--neutral)">0</span>
    <span style="font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--faster)">+30</span>
  </div>`;
  h+=`<div class="gc-tier-labels"><div class="gc-tier-lbl slow">&larr; Slow Growth</div><div class="gc-tier-lbl mid">Growth Neutral</div><div class="gc-tier-lbl fast">Pro Growth &rarr;</div></div>`;
  h+=`</div>`;

  h+=`<div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--neutral);margin:8px 0 0;line-height:1.6">
    <span style="color:var(--faster)">Pro Growth</span> = +7 to +30 &nbsp;&middot;&nbsp;
    <span style="color:var(--neutral)">Growth Neutral</span> = &minus;6 to +6 &nbsp;&middot;&nbsp;
    <span style="color:var(--slower)">Slow Growth</span> = &minus;30 to &minus;7 &nbsp;&middot;&nbsp;
    Thresholds subject to revision.
  </div>`;

  // Score table
  h+=`<div style="font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin:20px 0 4px">Candidate Scores</div>`;
  if(youData&&showYou){
    h+=`<div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--you);margin-bottom:8px;line-height:1.6">&#9733; <strong>Your Match</strong> = how closely your survey responses align with each candidate. 100% = identical answers on every question. Exact match = full credit, one step apart = half credit.</div>`;
  }
  h+=buildScoreTable(resp,youData,showYou);

  h+=`<div style="font-size:10px;color:var(--neutral);margin:16px 0;background:#f5f5f0;padding:10px 12px;border-left:2px solid var(--rule);line-height:1.65">
    <strong style="color:var(--ink)">How scores are calculated:</strong> Each response earns points based on its growth orientation &mdash; Strongly faster = +2, Somewhat faster = +1, Neither = 0, Somewhat slower = &minus;1, Strongly slower = &minus;2. Scores are based on the 15 questions with a clear growth orientation (Q6, Q7, Q8, Q10, and Q16 are excluded as their growth implications are more nuanced). A score near zero may reflect genuinely mixed positions, not indifference.${youData&&showYou?' The "Your Match" column shows question-by-question agreement percentage &mdash; exact match = full credit, one step apart = half credit.':''}
  </div>`;

  if(dnr.length){
    h+=`<div class="below-sect"><div class="below-sect-lbl">Did not respond &mdash; excluded from scoring</div><div class="below-area">`;
    dnr.forEach(c=>{
      const ph=PHOTOS[c.name]?`<img class="badge-photo" src="${PHOTOS[c.name]}">`:`<div class="badge-ph" style="background:#aaa">${c.name.split(" ").map(w=>w[0]).join("").substring(0,2)}</div>`;
      h+=`<div class="badge">${ph} ${c.name}</div>`;
    });
    h+=`</div></div>`;
  }

  h+=methNote();
  document.getElementById("main").innerHTML=h;
}

function methNote(){
  return`<div class="meth-note"><strong>About This Scorecard</strong><br><br>
  The Growth Orientation Spectrum reflects each candidate&rsquo;s stance toward housing and development in Howard County &mdash; not a judgment about which position is correct. <strong>Faster growth and slower growth represent two legitimate and reasonable ways of thinking about the county&rsquo;s future.</strong><br><br>
  <strong>Axis positions are fixed</strong> across all questions &mdash; Strongly Disagree always appears on the left, Strongly Agree on the right. On questions where agreeing reflects a slower-growth position, the spectrum colors and growth direction labels flip. Five questions (Q6, Q7, Q8, Q10, Q16) are marked where the growth framing is not directly relevant and are excluded from the Growth Continuum score.<br><br>
  <strong>&ldquo;Neither Agree nor Disagree&rdquo;</strong> responses appear at the center of the spectrum. Candidates who did not submit a response by the April 17 deadline are listed separately and excluded from Growth Continuum scoring.<br><br>
  <strong>Disclosure:</strong> The author has made small campaign contributions ($50 each) to Janssen Evelyn, Kevin Chin, and Jessica Nichols. All candidates received identical questionnaires and are presented on identical terms. No candidates have been endorsed.</div>`;
}

function prevQ(){if(qi<=-1)return;qi--;if(race==="readers"){race="exec";document.getElementById("racesel").value="exec";}syncSel();render();window.scrollTo(0,0);}
function nextQ(){if(qi>=21)return;qi++;if(race==="readers"){race="exec";document.getElementById("racesel").value="exec";}syncSel();render();window.scrollTo(0,0);}
function onQ(){
  const newQi=parseInt(document.getElementById("qsel").value);
  if(qi===20&&newQi!==20&&race==="readers"){race="exec";document.getElementById("racesel").value="exec";}
  qi=newQi;render();window.scrollTo(0,0);
}
function onRace(){race=document.getElementById("racesel").value;render();}
function syncSel(){document.getElementById("qsel").value=qi;}
function lookupYou(){
  const em=document.getElementById("email").value.trim().toLowerCase();
  if(!em)return;
  const r=READER_DATA[em]||null;
  if(r){youData={name:em,r};showYou=true;}
  else{youData=null;showYou=false;alert("No responses found for "+em+".\nMake sure you use the email you submitted the reader poll with.");}
  render();
}
function toggleYou(){showYou=!showYou;render();}

function init(){
  const sel=document.getElementById("qsel");
  [{v:-1,t:"Introduction"},
   ...QS.map((q,i)=>({v:i,t:`Q${q.id}: ${q.short}`})),
   {v:20,t:"Written Responses"},
   {v:21,t:"Growth Continuum"}
  ].forEach(({v,t})=>{const o=document.createElement("option");o.value=v;o.textContent=t;sel.appendChild(o);});

  const main=document.getElementById("main");
  main.addEventListener("touchstart",e=>{touchStartX=e.touches[0].clientX;},{passive:true});
  main.addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-touchStartX;if(Math.abs(dx)>45){dx<0?nextQ():prevQ();}},{passive:true});
  document.addEventListener("keydown",e=>{if(e.key==="ArrowRight")nextQ();if(e.key==="ArrowLeft")prevQ();});
  render();
}
init();
</script>

</html>
